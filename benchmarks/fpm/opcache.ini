; Opcache tuned like a production PHP-FPM deployment — gives the baseline every
; fair advantage (compiled opcodes cached across requests). CorePHP still skips
; the whole per-request interpreter/autoload re-init that FPM cannot avoid.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
opcache.jit=0
opcache.jit_buffer_size=0
