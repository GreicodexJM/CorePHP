
# =============================================================================
# CorePHP — Jekyll Configuration for GitHub Pages
# Theme: just-the-docs (https://just-the-docs.com/)
# =============================================================================

title: CorePHP
tagline: Production-grade persistent PHP 8.4 runtime
description: >
  CorePHP eliminates PHP's per-request restart overhead by running inside
  RoadRunner as a long-lived process. It replaces PHP's silent-failure
  stdlib with a typed, exception-throwing standard library.

url: "https://greicodexjm.github.io"
baseurl: "/CorePHP"

remote_theme: just-the-docs/just-the-docs@v0.10.1

color_scheme: dark

logo: "/assets/images/corephp-logo.png"

# Navigation
nav_sort: order   # use nav_order front matter to sort pages

# External links in the nav
nav_external_links:
  - title: "Docker Hub — greicodex/corephp-vm"
    url: https://hub.docker.com/r/greicodex/corephp-vm
  - title: "GitHub Repository"
    url: https://github.com/GreicodexJM/CorePHP

# Footer
footer_content: >
  &copy; 2026 Greicodex. Released under the MIT License.

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Plugins (GitHub Pages safe list)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - PROJECT.md
