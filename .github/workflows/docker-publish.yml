name: Build & Push corephp-vm

# =============================================================================
# Triggers:
#   push to main        → builds and pushes `edge` + `sha-<hash>` tags
#   push of v*.*.* tag  → builds and pushes semver tags + `latest`
#   pull_request        → builds only (no push), validates the Dockerfile
# =============================================================================
on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # -------------------------------------------------------------------------
      # 1. Checkout
      # -------------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # 2. Docker Buildx (BuildKit)
      # -------------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------------------
      # 3. Generate tags & OCI labels from git metadata
      #
      #    Tag matrix:
      #      v1.2.3 push  → greicodex/corephp-vm:1.2.3
      #                   → greicodex/corephp-vm:1.2
      #                   → greicodex/corephp-vm:1
      #                   → greicodex/corephp-vm:latest
      #      main push    → greicodex/corephp-vm:edge
      #      any push     → greicodex/corephp-vm:sha-<short-sha>
      # -------------------------------------------------------------------------
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: greicodex/corephp-vm
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=main
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=CorePHP VM
            org.opencontainers.image.description=Persistent, hardened PHP 8.3 runtime with RoadRunner and typed std library
            org.opencontainers.image.vendor=Greicodex
            org.opencontainers.image.licenses=MIT

      # -------------------------------------------------------------------------
      # 4. Login to Docker Hub — only on actual pushes (not PRs)
      # -------------------------------------------------------------------------
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------------------------------------------------
      # 5. Build & Push
      #    - Platform: linux/arm64 only
      #    - Cache: GitHub Actions cache (free, zero config)
      #    - Push: only on non-PR events
      # -------------------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # -------------------------------------------------------------------------
      # 6. Print image digest for traceability
      # -------------------------------------------------------------------------
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Pushed digest ${{ steps.build-and-push.outputs.digest }}"

      # -------------------------------------------------------------------------
      # 7. Sync DOCKERHUB_README.md → Docker Hub repository description
      #    Runs only on actual pushes (not PRs). Uses the same credentials
      #    already required by step 4 (docker/login-action).
      # -------------------------------------------------------------------------
      - name: Update Docker Hub description
        if: github.event_name != 'pull_request'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: greicodex/corephp-vm
          readme-filepath: ./DOCKERHUB_README.md
          short-description: "Persistent, hardened PHP 8.4 runtime — RoadRunner + typed std library. Zero silent failures."
