name: Deploy GitHub Pages

# =============================================================================
# Deploys the docs/ folder to GitHub Pages on every push to main.
# Theme: just-the-docs
# URL: https://greicodexjm.github.io/CorePHP/
# =============================================================================
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Copy logo to docs/assets/images/ so Jekyll can serve it
      - name: Copy logo to assets
        run: |
          mkdir -p docs/assets/images
          cp docs/corephp-logo.png docs/assets/images/corephp-logo.png

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
