; =============================================================================
; CorePHP (PHP-JVM) — Shared Hosting "Simulated JVM" Mode
; =============================================================================
;
; For environments where you CANNOT use Docker or RoadRunner (shared hosting,
; cPanel, Plesk), drop this .user.ini file in your web root.
;
; This applies a subset of the PHP-JVM safety configuration that is allowed
; by shared hosting providers (they typically allow user.ini overrides for
; a limited set of directives).
;
; LIMITATIONS vs Full Docker Mode:
;   - runkit7 is NOT available (no native function overrides)
;   - disable_functions cannot be set per-directory (only globally by host)
;   - Process does NOT persist between requests (no RoadRunner)
;
; WHAT THIS PROVIDES:
;   - auto_prepend_file: still runs bootstrap.php before all code
;   - Error reporting hardened
;   - Session security hardened
;   - URL includes disabled (if not already)
;
; INSTRUCTIONS:
;   1. Upload this file to your public_html / www / htdocs directory
;   2. Upload opt/php-jvm/ to a location OUTSIDE your web root
;   3. Update the auto_prepend_file path below to match your server's path
;   4. Ensure the std library is installed via Composer
;
; =============================================================================

; Prepend the bootstrap sandbox before every request
; UPDATE this path to match your server's absolute path:
auto_prepend_file = /home/yourusername/php-jvm/bootstrap.php

; Error handling — log everything, show nothing to users
error_reporting        = E_ALL
display_errors         = Off
display_startup_errors = Off
log_errors             = On

; File access restrictions (if not already set by host)
allow_url_fopen   = Off
allow_url_include = Off

; Execution limits
max_execution_time  = 30
memory_limit        = 128M

; Session hardening
session.use_strict_mode   = 1
session.cookie_httponly   = 1
session.cookie_secure     = 1
session.cookie_samesite   = Strict
session.use_only_cookies  = 1
session.use_trans_sid     = 0
