version: "3.9"

# =============================================================================
# CorePHP (PHP-JVM) — Docker Compose
# Production / base configuration
# =============================================================================

services:
  app:
    image: php-jvm:latest
    container_name: php-jvm-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./:/app:ro
    working_dir: /app
    command: ["rr", "serve", "-c", "/app/.rr.yaml"]
    healthcheck:
      test: ["CMD", "rr", "http:status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      - APP_ENV=production
      - LOG_LEVEL=warning
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
