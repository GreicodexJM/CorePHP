version: "3.9"

# =============================================================================
# CorePHP — Docker Compose
# Production / base configuration
# =============================================================================

services:
  app:
    image: corephp-vm:latest
    container_name: corephp-vm-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Production runs the image as-built: /app (worker.php, .rr.yaml, vendor,
    # std library) all come from the image. Do NOT bind-mount host source over
    # /app here — that would shadow the baked-in vendor and crash the workers.
    # Live source mounting is a development concern; see docker-compose.override.yaml.
    working_dir: /app
    command: ["rr", "serve", "-c", "/app/.rr.yaml"]
    healthcheck:
      test: ["CMD", "rr", "http:status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      - APP_ENV=production
      - LOG_LEVEL=warning
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
