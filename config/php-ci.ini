; =============================================================================
; CorePHP (PHP-JVM) — CI php.ini (for PHPStan / PHPUnit inside Docker)
;
; Identical to config/php.ini EXCEPT:
;   - disable_functions is EMPTY (PHPStan uses unserialize() for its cache)
;   - auto_prepend_file is empty (bootstrap must not run during static analysis)
;
; Usage (ephemeral docker run):
;   docker run --rm -v $(pwd)/config/php-ci.ini:/usr/local/etc/php/php.ini:ro ...
; =============================================================================

[PHP]
error_reporting        = E_ALL
display_errors         = Off
display_startup_errors = Off
log_errors             = Off
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks        = On

; No bootstrap for CI — PHPUnit / PHPStan load autoload.php themselves
auto_prepend_file =

; runkit7 still needed for FunctionOverrider stubs
runkit.internal_override = 1

; EMPTY — tools like PHPStan (unserialize) and PHPUnit (proc_open) need these
disable_functions =
disable_classes   =

; File system
allow_url_fopen   = Off
allow_url_include = Off

; Generous limits for analysis
max_execution_time  = 300
max_input_time      = 300
memory_limit        = 512M

[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 1
opcache.memory_consumption     = 256
opcache.interned_strings_buffer= 16
opcache.max_accelerated_files  = 20000
opcache.validate_timestamps    = 1
opcache.save_comments          = 1

[Date]
date.timezone = UTC
