; =============================================================================
; CorePHP (PHP-JVM) — Hardened php.ini
; PHP 8.3 production configuration with engine-level security enforcement
; =============================================================================

[PHP]

; ---------------------------------------------------------------------------
; Error Handling — all errors visible in logs, never to output
; ---------------------------------------------------------------------------
error_reporting        = E_ALL
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /var/log/php/error.log
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks        = On

; ---------------------------------------------------------------------------
; Prepend Sandbox — runs before ALL user code
; This is the "JVM boot sequence"
; ---------------------------------------------------------------------------
auto_prepend_file = /opt/php-jvm/bootstrap.php

; ---------------------------------------------------------------------------
; runkit7 — REQUIRED for native function overriding
; Without this, runkit7_function_redefine() cannot override built-ins
; ---------------------------------------------------------------------------
runkit.internal_override = 1

; ---------------------------------------------------------------------------
; SECURITY: Disable dangerous functions at the engine level
; These cannot be called by ANY PHP code — not by application, not by vendor
; ---------------------------------------------------------------------------
disable_functions = unserialize,
                    serialize,
                    exec,
                    shell_exec,
                    system,
                    passthru,
                    proc_open,
                    popen,
                    proc_get_status,
                    proc_close,
                    proc_terminate,
                    proc_nice,
                    pcntl_exec,
                    pcntl_fork,
                    pcntl_signal,
                    pcntl_waitpid,
                    pcntl_wait,
                    posix_kill,
                    posix_setuid,
                    posix_setgid,
                    posix_setsid,
                    dl,
                    phpinfo,
                    symlink,
                    link,
                    readlink,
                    getmypid,
                    getmyuid,
                    getmygid,
                    putenv,
                    apache_setenv,
                    ini_set,
                    ini_restore,
                    show_source,
                    highlight_file

; ---------------------------------------------------------------------------
; SECURITY: Disable dangerous classes
; ---------------------------------------------------------------------------
disable_classes =

; ---------------------------------------------------------------------------
; File system — restrict URL-based file access
; ---------------------------------------------------------------------------
allow_url_fopen   = Off
allow_url_include = Off

; ---------------------------------------------------------------------------
; Execution limits — prevent runaway requests
; ---------------------------------------------------------------------------
max_execution_time  = 30
max_input_time      = 30
memory_limit        = 128M
post_max_size       = 8M
upload_max_filesize = 2M

; ---------------------------------------------------------------------------
; Session hardening
; ---------------------------------------------------------------------------
session.use_strict_mode      = 1
session.cookie_httponly      = 1
session.cookie_secure        = 1
session.cookie_samesite      = Strict
session.use_only_cookies     = 1
session.use_trans_sid        = 0
session.hash_function        = sha256

; ---------------------------------------------------------------------------
; Opcache — performance for RoadRunner's persistent workers
; ---------------------------------------------------------------------------
[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer= 16
opcache.max_accelerated_files  = 20000
opcache.revalidate_freq        = 60
opcache.validate_timestamps    = 0
opcache.save_comments          = 1
opcache.fast_shutdown          = 1

; ---------------------------------------------------------------------------
; Date
; ---------------------------------------------------------------------------
[Date]
date.timezone = UTC
