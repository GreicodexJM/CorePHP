# =============================================================================
# CorePHP drop-in proof — the SAME unmodified app on two runtimes.
#   CorePHP  : http://localhost:8092   (persistent, hardened)
#   Stock PHP: http://localhost:8093   (php -S, default error handling)
# =============================================================================

services:
  corephp:
    image: corephp-vm:latest
    container_name: demo-corephp
    ports:
      - "8092:8080"
    volumes:
      - ./app:/demo:ro
      - ./.rr.demo.yaml:/rr.yaml:ro
    command: ["rr", "serve", "-c", "/rr.yaml"]

  stock:
    image: php:8.4-cli-alpine
    container_name: demo-stock
    ports:
      - "8093:80"
    volumes:
      - ./app:/demo:ro
    working_dir: /demo
    # Production-like: errors logged, not displayed — so warnings are swallowed.
    command:
      - php
      - -d
      - display_errors=0
      - -d
      - log_errors=1
      - -d
      - error_log=/tmp/stock-errors.log
      - -S
      - 0.0.0.0:80
      - server.php
